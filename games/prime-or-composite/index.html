<style>
:root {
  --ink:#070d1a; --navy:#0b1629; --navy-mid:#0f1f3d; --navy-light:#162847;
  --gold:#c9a84c; --gold-warm:#e2b96a; --gold-dim:#7a5e28;
  --teal:#2dd4bf; --teal-dim:#134e4a;
  --body:#a8b8d0; --muted:#4a6080; --border:#1a2e4a; --border-dim:#111f33;
  --success:#22c55e; --danger:#ef4444; --warn:#f59e0b;
  --prime:#60a5fa; --composite:#f97316;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--body);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:100;width:100%;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:52px;background:rgba(7,13,26,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-dim)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.15em;color:var(--gold);text-decoration:none}
.nav-back{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--gold)}
.page{position:relative;z-index:1;width:100%;max-width:480px;padding:2rem 1rem 4rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
.game-header{text-align:center}
.game-kicker{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal);margin-bottom:0.4rem}
.game-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.06em;color:var(--gold-warm);line-height:1}
.game-sub{font-size:0.75rem;color:var(--muted);line-height:1.6;margin-top:0.4rem}

.status-bar{display:flex;gap:0.8rem;width:100%;background:var(--navy-mid);border:1px solid var(--border);border-radius:4px;padding:0.75rem 1rem;justify-content:space-around}
.si{display:flex;flex-direction:column;align-items:center;gap:0.15rem}
.si-val{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--gold)}
.si-lbl{font-family:'DM Mono',monospace;font-size:0.45rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}

/* Main number display */
.number-arena{
  width:100%;min-height:200px;
  background:var(--navy-mid);border:1px solid var(--border);border-radius:4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.8rem;
  position:relative;overflow:hidden;
}
.number-arena::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(201,168,76,0.04) 0%,transparent 70%);
  pointer-events:none;
}
.round-label{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.big-number{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,15vw,6rem);
  letter-spacing:0.05em;color:var(--body);
  transition:transform 0.15s,opacity 0.15s;
  text-shadow:0 0 40px rgba(201,168,76,0.15);
}
.big-number.flash-correct{color:var(--success);transform:scale(1.05)}
.big-number.flash-wrong{color:var(--danger);animation:shake 0.35s ease}
.number-hint{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);font-style:italic;text-align:center;padding:0 1rem}

/* Timer bar */
.timer-track{width:90%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.1s linear,background 0.3s}
.timer-fill.warn{background:var(--warn)}
.timer-fill.danger{background:var(--danger)}

/* Answer buttons */
.answer-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;width:100%}
.ans-btn{
  padding:1.2rem 1rem;
  font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.1em;
  cursor:pointer;border-radius:4px;border:2px solid;
  transition:all 0.15s;
}
.ans-prime{background:rgba(96,165,250,0.08);border-color:rgba(96,165,250,0.3);color:var(--prime)}
.ans-prime:hover{background:rgba(96,165,250,0.18);border-color:var(--prime)}
.ans-composite{background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.3);color:var(--composite)}
.ans-composite:hover{background:rgba(249,115,22,0.18);border-color:var(--composite)}
.ans-btn.correct{background:rgba(34,197,94,0.2);border-color:var(--success)}
.ans-btn.wrong{background:rgba(239,68,68,0.2);border-color:var(--danger)}
.ans-btn:disabled{pointer-events:none}

/* Streak indicator */
.streak-bar{width:100%;display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--border);border:1px solid var(--muted);transition:all 0.2s}
.streak-dot.hit{background:var(--success);border-color:var(--success);box-shadow:0 0 6px rgba(34,197,94,0.4)}
.streak-dot.miss{background:var(--danger);border-color:var(--danger)}

/* Result explanation */
.explain-box{
  width:100%;background:var(--navy-mid);border:1px solid var(--border-dim);
  border-left:3px solid var(--teal-dim);border-radius:3px;
  padding:0.8rem 1rem;
  font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--teal);line-height:1.6;
  animation:slideIn 0.2s ease;display:none;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.btn{padding:0.65rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:3px;border:none;transition:all 0.2s;width:100%}
.btn-gold{background:var(--gold);color:var(--ink);font-weight:500}
.btn-gold:hover{background:var(--gold-warm)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--gold-dim);color:var(--gold)}

/* Leaderboard */
.lb-section{width:100%;background:var(--navy-mid);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.lb-header{padding:0.75rem 1rem;border-bottom:1px solid var(--border-dim);display:flex;align-items:center;justify-content:space-between}
.lb-title{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.lb-body{padding:0.5rem 0}
.lb-empty{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);text-align:center;padding:1.2rem;font-style:italic}
.lb-row{display:grid;grid-template-columns:1.5rem 1fr auto auto;gap:0.5rem;align-items:center;padding:0.4rem 1rem;border-bottom:1px solid var(--border-dim);font-family:'DM Mono',monospace;font-size:0.6rem}
.lb-row:last-child{border-bottom:none}
.lb-row.hl{background:rgba(201,168,76,0.06)}
.lb-rank{color:var(--muted)}.lb-name{color:var(--body)}.lb-score{color:var(--gold);text-align:right}.lb-acc{color:var(--muted);font-size:0.52rem;text-align:right}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(7,13,26,0.88);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-overlay.hidden{display:none}
.modal{background:var(--navy-mid);border:1px solid var(--border);border-radius:4px;width:100%;max-width:380px;overflow:hidden;animation:popIn 0.25s ease}
@keyframes popIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:1.4rem 1.4rem 0;text-align:center}
.modal-result{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.1em;color:var(--gold-warm);margin-bottom:0.3rem}
.modal-score{margin:1rem 1.4rem;background:var(--navy-light);border:1px solid var(--border-dim);border-radius:3px;padding:0.8rem;display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.ms-item{display:flex;flex-direction:column;gap:0.1rem}
.ms-val{font-family:'DM Mono',monospace;font-size:0.9rem;color:var(--gold)}
.ms-lbl{font-family:'DM Mono',monospace;font-size:0.45rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.modal-name{padding:0 1.4rem;display:flex;flex-direction:column;gap:0.4rem}
.modal-name label{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.name-input{background:var(--navy);border:1px solid var(--border);border-radius:3px;padding:0.6rem 0.8rem;font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--body);outline:none;width:100%}
.name-input:focus{border-color:var(--gold-dim)}
.modal-acts{display:flex;gap:0.5rem;padding:1rem 1.4rem 1.4rem}
.modal-acts .btn{flex:1}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>

<script>
// ─── NUMBER GENERATION ────────────────────────────────────────────────
function isPrime(n) {
  if (n < 2) return false;
  if (n === 2) return true;
  if (n % 2 === 0) return false;
  for (let i = 3; i <= Math.sqrt(n); i += 2) if (n % i === 0) return false;
  return true;
}

function getFactors(n) {
  const f = [];
  for (let i = 2; i <= n/2; i++) if (n % i === 0) f.push(i);
  return f;
}

// Curated question bank — escalating difficulty
const QUESTIONS = [
  // Easy (small, obvious)
  {n:7,   hint:"Single digit"},
  {n:15,  hint:"Divisible by 3 and 5"},
  {n:17,  hint:"Two digits"},
  {n:24,  hint:"Even number"},
  {n:29,  hint:"Two digits"},
  {n:49,  hint:"Think squares"},
  {n:97,  hint:"Largest two-digit…?"},
  {n:91,  hint:"7 × 13 = ?"},
  // Medium
  {n:101, hint:"Three digits"},
  {n:143, hint:"11 × 13 = ?"},
  {n:127, hint:"Mersenne-adjacent"},
  {n:169, hint:"Think squares again"},
  {n:211, hint:"Three digits, odd"},
  {n:221, hint:"13 × 17 = ?"},
  {n:257, hint:"Fermat prime candidate"},
  {n:289, hint:"17² = ?"},
  // Hard (large, tricky)
  {n:1009, hint:"First four-digit prime?"},
  {n:1021, hint:"Four digits"},
  {n:1681, hint:"41² = ?"},
  {n:9973, hint:"Largest four-digit prime?"},
];

// Shuffle using seeded RNG keyed to today
function dayStr(){const d=new Date();return`${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`}
function seededRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff}}
function shuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const LKEY = () => 'poc_lb_' + dayStr();
const TIME_PER_Q = 5000; // ms
const SCORE_BASE = 100;

let questions, qIdx, score, streak, maxStreak, correct, total;
let qTimer, timerStart, animFrame;
let gameActive = false;

function initQuestions() {
  const seed = parseInt(dayStr().replace(/_/g,''));
  questions = shuffle([...QUESTIONS], seededRng(seed));
}

// ─── GAME FLOW ────────────────────────────────────────────────────────
function startGame() {
  initQuestions();
  qIdx=0; score=0; streak=0; maxStreak=0; correct=0; total=0;
  gameActive = true;
  document.getElementById('start-btn').style.display='none';
  document.getElementById('explain-box').style.display='none';
  buildStreakBar();
  updateStatus();
  nextQuestion();
}

function nextQuestion() {
  if (qIdx >= questions.length) { endGame(); return; }
  const q = questions[qIdx];
  document.getElementById('round-label').textContent = `Question ${qIdx+1} of ${questions.length}`;
  document.getElementById('big-number').textContent = q.n;
  document.getElementById('big-number').className = 'big-number';
  document.getElementById('number-hint').textContent = q.hint;
  document.getElementById('explain-box').style.display='none';
  document.getElementById('btn-prime').disabled = false;
  document.getElementById('btn-composite').disabled = false;
  document.getElementById('btn-prime').className='ans-btn ans-prime';
  document.getElementById('btn-composite').className='ans-btn ans-composite';
  timerStart = Date.now();
  startTimerBar();
}

function startTimerBar() {
  clearTimeout(qTimer);
  cancelAnimationFrame(animFrame);
  function tick() {
    const elapsed = Date.now() - timerStart;
    const pct = Math.max(0, 100 - (elapsed / TIME_PER_Q) * 100);
    const fill = document.getElementById('timer-fill');
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (pct<40?' warn':'') + (pct<15?' danger':'');
    if (pct > 0 && gameActive) animFrame = requestAnimationFrame(tick);
  }
  tick();
  qTimer = setTimeout(() => timeOut(), TIME_PER_Q);
}

function timeOut() {
  cancelAnimationFrame(animFrame);
  // Mark as wrong
  markResult(false, true);
}

function answer(isPrimeAnswer) {
  if (!gameActive) return;
  clearTimeout(qTimer);
  cancelAnimationFrame(animFrame);
  const q = questions[qIdx];
  const correct_answer = isPrime(q.n);
  markResult(isPrimeAnswer === correct_answer, false);
}

function markResult(wasCorrect, timedOut) {
  document.getElementById('btn-prime').disabled = true;
  document.getElementById('btn-composite').disabled = true;
  const q = questions[qIdx];
  const elapsed = (Date.now() - timerStart) / 1000;
  total++;

  if (wasCorrect) {
    correct++;
    // Speed bonus: faster = more points
    const speedBonus = Math.round(SCORE_BASE * Math.max(0.2, 1 - elapsed/TIME_PER_Q*1000));
    score += speedBonus;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    flashNumber(true);
    highlightBtn(isPrime(q.n) ? 'prime' : 'composite', true);
  } else {
    streak = 0;
    if (!timedOut) flashNumber(false);
    highlightBtn(isPrime(q.n) ? 'prime' : 'composite', false);
  }

  updateStreakDot(qIdx, wasCorrect);
  showExplanation(q, wasCorrect, timedOut);
  updateStatus();
  qIdx++;
  setTimeout(nextQuestion, 1800);
}

function flashNumber(ok) {
  const el = document.getElementById('big-number');
  el.className = 'big-number ' + (ok ? 'flash-correct' : 'flash-wrong');
}

function highlightBtn(type, wasCorrect) {
  const btn = type==='prime' ? document.getElementById('btn-prime') : document.getElementById('btn-composite');
  btn.classList.add(wasCorrect ? 'correct' : 'wrong');
}

function showExplanation(q, correct, timedOut) {
  const box = document.getElementById('explain-box');
  const prime = isPrime(q.n);
  let txt = timedOut ? '⏱ Too slow! ' : (correct ? '✓ Correct. ' : '✗ Wrong. ');
  if (prime) {
    txt += `${q.n} is prime — no divisors other than 1 and itself.`;
  } else {
    const f = getFactors(q.n);
    txt += `${q.n} is composite — divisible by ${f.slice(0,3).join(', ')}${f.length>3?'…':''}.`;
  }
  box.textContent = txt;
  box.style.display = 'block';
}

function buildStreakBar() {
  const bar = document.getElementById('streak-bar');
  bar.innerHTML = '';
  for (let i=0;i<questions.length;i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot';
    d.id = 'sd'+i;
    bar.appendChild(d);
  }
}
function updateStreakDot(i, ok) {
  const d = document.getElementById('sd'+i);
  if (d) d.className = 'streak-dot ' + (ok?'hit':'miss');
}

function updateStatus() {
  document.getElementById('sv-q').textContent = qIdx+1 > questions.length ? questions.length : qIdx+1;
  document.getElementById('sv-score').textContent = score;
  document.getElementById('sv-streak').textContent = streak;
  document.getElementById('sv-acc').textContent = total ? Math.round(correct/total*100)+'%' : '—';
}

// ─── GAME END ─────────────────────────────────────────────────────────
function endGame() {
  gameActive = false;
  cancelAnimationFrame(animFrame);
  clearTimeout(qTimer);
  document.getElementById('big-number').textContent = '✓';
  document.getElementById('big-number').className = 'big-number flash-correct';
  document.getElementById('round-label').textContent = 'Complete!';
  document.getElementById('number-hint').textContent = '';
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('explain-box').style.display='none';
  setTimeout(() => showModal(), 600);
}

function showModal() {
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modal-result').textContent = score > 1200 ? 'Exceptional.' : score > 800 ? 'Well Played.' : 'Keep Practising.';
  document.getElementById('modal-score').innerHTML = `
    <div class="ms-item"><span class="ms-val">${score.toLocaleString()}</span><span class="ms-lbl">Final Score</span></div>
    <div class="ms-item"><span class="ms-val">${correct}/${questions.length}</span><span class="ms-lbl">Correct</span></div>
    <div class="ms-item"><span class="ms-val">${Math.round(correct/questions.length*100)}%</span><span class="ms-lbl">Accuracy</span></div>
    <div class="ms-item"><span class="ms-val">${maxStreak}</span><span class="ms-lbl">Best Streak</span></div>
  `;
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('start-btn').style.display='block';
  document.getElementById('start-btn').textContent='Play Again';
  document.getElementById('big-number').textContent='?';
  document.getElementById('big-number').className='big-number';
  document.getElementById('round-label').textContent='Ready to begin';
  document.getElementById('number-hint').textContent='Press Start to play';
  document.getElementById('timer-fill').style.width='100%';
  buildStreakBar();
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────
function loadLB(){try{return JSON.parse(localStorage.getItem(LKEY()))||[];}catch{return[]}}
function renderLB(hl){
  const arr=loadLB(),el=document.getElementById('lb-out');
  if(!arr.length){el.innerHTML='<div class="lb-empty">No scores yet.</div>';return}
  el.innerHTML=arr.slice(0,10).map((e,i)=>`
    <div class="lb-row ${e.name===hl?'hl':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${escHtml(e.name)}</span>
      <span class="lb-score">${e.sc.toLocaleString()}</span>
      <span class="lb-acc">${e.acc}%</span>
    </div>`).join('')
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function submitToLB(){
  const name=document.getElementById('name-input').value.trim().slice(0,20)||'Anonymous';
  const arr=loadLB();
  arr.push({name,sc:score,acc:Math.round(correct/questions.length*100),ts:Date.now()});
  arr.sort((a,b)=>b.sc-a.sc);
  localStorage.setItem(LKEY(),JSON.stringify(arr));
  document.getElementById('modal').classList.add('hidden');
  renderLB(name);
  document.getElementById('start-btn').style.display='block';
  document.getElementById('start-btn').textContent='Play Again';
}

// Keyboard: P = prime, C = composite
document.addEventListener('keydown',e=>{
  if(!gameActive)return;
  if(e.key==='p'||e.key==='P')answer(true);
  if(e.key==='c'||e.key==='C')answer(false);
});

renderLB('');
</script>

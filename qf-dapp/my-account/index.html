<style>
:root {
  --bg:            #0e1013;
  --surface:       #16181c;
  --surface2:      #1e2025;
  --surface3:      #26282e;
  --silver:        #b8bcc6;
  --silver-bright: #d4d8e2;
  --silver-dim:    rgba(184,188,198,0.08);
  --silver-glow:   rgba(184,188,198,0.12);
  --silver-border: rgba(184,188,198,0.15);
  --text-white:    #e8eaf0;
  --text:          #8a8f9c;
  --muted:         #4a4e5a;
  --border:        #1e2228;
  --border2:       #2a2e36;
  --gold:          #c9a84c;
  --green:         #3a8a5c;
  --red:           #b03a3a;
  --blue:          #3a6a9c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}

/* ── Page ── */
.page{width:100%;max-width:800px;padding:2rem 1rem 4rem;display:flex;flex-direction:column;gap:1.5rem}

/* ── Header ── */
.acct-header{text-align:center}
.acct-header h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--text-white);letter-spacing:.06em}
.acct-wallet{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-top:.3rem}
.acct-qfname{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--silver-bright);margin-top:.2rem}

/* ── Tab bar ── */
.tab-bar{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-pills{display:flex;gap:.4rem;padding:.2rem 0;white-space:nowrap}
.tab-pill{font-family:'DM Mono',monospace;font-size:.65rem;padding:.45rem .9rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0}
.tab-pill:hover{border-color:var(--silver-border);color:var(--text)}
.tab-pill.active{background:var(--silver-dim);border-color:var(--silver-border);color:var(--silver-bright)}

/* ── Tab content ── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Loading / empty ── */
.loading{text-align:center;padding:3rem 0;font-size:.75rem;color:var(--muted)}
.empty{text-align:center;padding:3rem 1rem;font-size:.75rem;color:var(--muted);line-height:1.6}

/* ── Score cards ���─ */
.score-section{margin-bottom:1.5rem}
.score-section h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--silver-bright);letter-spacing:.04em;margin-bottom:.5rem}
.hs-cards{display:flex;flex-direction:column;gap:.6rem}
.hs-card{background:var(--surface);border:1px solid var(--border);border-left:2px solid var(--surface2);border-radius:10px;overflow:hidden}
.hs-card-header{display:flex;align-items:center;padding:.65rem .8rem;gap:.5rem}
.hs-card-game{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-white);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hs-card-diff{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:.15rem .45rem;border-radius:10px;border:1px solid var(--muted);flex-shrink:0}
.hs-card-diff.hard{color:var(--gold);border-color:var(--gold)}
.hs-diff-table{width:100%;border-collapse:collapse;border-top:1px solid var(--border)}
.hs-diff-table td{padding:.35rem .8rem;font-family:'DM Mono',monospace;font-size:.6rem}
.hs-diff-table tr+tr td{border-top:1px solid var(--surface2)}
.hs-diff-table .hs-dt-diff{color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-size:.5rem;width:30%}
.hs-diff-table .hs-dt-score{color:var(--gold);text-align:right;width:35%}
.hs-diff-table .hs-dt-date{color:var(--muted);text-align:right;width:35%;font-size:.5rem}
.hs-card-rank{font-family:'DM Mono',monospace;font-size:.55rem;padding:.15rem .5rem;border-radius:10px;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.25);flex-shrink:0;white-space:nowrap}
.hs-card-stats{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.hs-stat{padding:.5rem .8rem}
.hs-stat+.hs-stat{border-left:1px solid var(--border)}
.hs-stat-label{font-family:'DM Mono',monospace;font-size:.45rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.15rem}
.hs-stat-val{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--gold)}
.hs-card-lb{border-top:1px solid var(--border);padding:.45rem .8rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.hs-lb-label{font-family:'DM Mono',monospace;font-size:.45rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex-shrink:0}
.hs-lb-periods{display:flex;gap:.3rem;flex-wrap:wrap}
.hs-lb-period{font-family:'DM Mono',monospace;font-size:.52rem;padding:.12rem .4rem;border-radius:4px;border:1px solid var(--border2);color:var(--muted)}
.hs-lb-period.ranked{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.25)}
.hs-card-footer{background:var(--surface2);border-top:1px solid var(--border);padding:.5rem .8rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;min-height:44px}
.hs-footer-text{font-family:'DM Mono',monospace;font-size:.55rem;color:#2dd4a0;flex:1;min-width:0}
.hs-submit-btn{font-family:'DM Mono',monospace;font-size:.6rem;padding:.4rem .8rem;border-radius:6px;border:1px solid var(--gold);background:rgba(201,168,76,.1);color:var(--gold);cursor:pointer;transition:all .15s;flex-shrink:0;min-height:44px;min-width:44px}
.hs-submit-btn:hover{background:rgba(201,168,76,.2)}
.hs-submit-btn:disabled{opacity:.4;cursor:default}
.hs-diff-block{border-top:1px solid var(--border)}
.hs-diff-summary{display:flex;align-items:center;gap:.6rem;padding:.4rem .8rem}
.hs-diff-name{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);flex:0 0 80px}
.hs-diff-score{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gold);flex:1;text-align:right}
.hs-diff-date{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);flex:0 0 auto}
.hs-period-row{display:flex;flex-wrap:wrap;gap:.3rem;padding:.2rem .8rem .6rem}
.hs-period{font-family:'DM Mono',monospace;font-size:.55rem;padding:.3rem .55rem;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted)}
.hs-period.ranked{background:rgba(201,168,76,.08);color:var(--gold);border-color:rgba(201,168,76,.25)}
.hs-period.muted{color:var(--muted);opacity:.7}
.hs-period-btn{font-family:'DM Mono',monospace;font-size:.55rem;padding:.3rem .55rem;border-radius:5px;border:1px solid var(--gold);background:rgba(201,168,76,.1);color:var(--gold);cursor:pointer;transition:all .15s}
.hs-period-btn:hover:not(:disabled){background:rgba(201,168,76,.22)}
.hs-period-btn:disabled{opacity:.55;cursor:default}
.hs-period-btn.update{border-color:#2dd4a0;background:rgba(45,212,160,.1);color:#2dd4a0}
.hs-period-btn.update:hover:not(:disabled){background:rgba(45,212,160,.22)}
.hs-period-btn-done{border-color:#2dd4a0 !important;background:rgba(45,212,160,.12) !important;color:#2dd4a0 !important}

/* ── League cards ── */
.league-group{margin-bottom:1.5rem}
.league-group h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--silver-bright);letter-spacing:.04em;margin-bottom:.5rem}
.league-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;text-decoration:none;color:inherit;transition:border-color .15s}
.league-card:hover{border-color:var(--silver-border)}
.lc-left{display:flex;flex-direction:column;gap:.2rem}
.lc-game{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--silver-bright)}
.lc-tier{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.lc-right{display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.lc-stat{text-align:center}
.lc-stat-val{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--text-white)}
.lc-stat-label{font-family:'DM Mono',monospace;font-size:.45rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.lc-badge{font-family:'DM Mono',monospace;font-size:.55rem;padding:.2rem .5rem;border-radius:4px}
.lc-badge.gold{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.lc-badge.silver{background:var(--silver-dim);color:var(--silver);border:1px solid var(--silver-border)}
.lc-badge.bronze{background:rgba(205,127,50,.12);color:#cd7f32;border:1px solid rgba(205,127,50,.25)}

/* ── Achievement cards ── */
.ach-list{display:flex;flex-direction:column;gap:.5rem}
.ach-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;display:flex;align-items:flex-start;gap:.8rem}
.ach-card.pioneer{border:2px solid #c9a84c;box-shadow:0 0 8px #c9a84c,0 0 16px #c9a84c40;animation:pioneer-pulse 2s ease-in-out infinite}
@keyframes pioneer-pulse{0%,100%{box-shadow:0 0 8px #c9a84c,0 0 16px #c9a84c40}50%{box-shadow:0 0 16px #c9a84c,0 0 32px #c9a84c80}}
.ach-img-wrap{position:relative;width:120px;height:120px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface2)}
.ach-img-wrap img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s ease,filter .5s ease}
.ach-img-wrap img.loaded{opacity:1}
.ach-img-wrap img.blurred{filter:blur(12px);transform:scale(1.1)}
.ach-img-wrap img.blurred.loaded{opacity:1}
.ach-blur-overlay{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:.3rem 0;font-family:'DM Mono',monospace;font-size:.45rem;color:var(--muted);background:rgba(0,0,0,.5);letter-spacing:.04em}
.ach-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;background:var(--surface2);border-radius:8px}
.ach-placeholder .lock-icon{font-size:1.4rem;color:var(--muted);line-height:1}
.ach-placeholder .lock-text{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted)}
.ach-body{display:flex;flex-direction:column;gap:.15rem;flex:1;min-width:0}
.ach-right-col{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:.15rem;margin-left:auto}
.ach-name{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--silver-bright)}
.ach-desc{font-family:'Inter',sans-serif;font-size:.6rem;color:var(--silver);line-height:1.35;margin-top:.05rem}
.ach-date{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted)}
.ach-minted{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--green)}
.ach-tx{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:.15rem}
.ach-mint-btn{font-family:'DM Mono',monospace;font-size:.6rem;padding:.3rem .7rem;border-radius:5px;border:1px solid var(--gold);background:rgba(201,168,76,.1);color:var(--gold);cursor:pointer;transition:all .15s}
.ach-mint-btn:hover{background:rgba(201,168,76,.2)}
.ach-mint-btn:disabled{opacity:.4;cursor:default}
.ach-wallet-btn{font-family:'DM Mono',monospace;font-size:.5rem;padding:.25rem .6rem;border-radius:5px;border:1px solid var(--silver-border);background:var(--surface2);color:var(--silver);cursor:pointer;transition:all .15s;margin-top:.3rem}
.ach-wallet-btn:hover{background:var(--surface3);border-color:var(--silver)}
.ach-wallet-btn:disabled{opacity:.5;cursor:default}
.free-mints-banner{background:var(--surface);border:1px solid var(--gold);border-radius:8px;padding:.6rem 1rem;margin-bottom:.8rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);text-align:center}
.ach-browse{display:block;text-align:center;margin-top:1rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--silver);text-decoration:none;transition:color .15s}
.ach-browse:hover{color:var(--silver-bright)}
.coming-soon{text-align:center;padding:3rem 1rem;font-size:.8rem;color:var(--muted)}
.ach-img-wrap.clickable{cursor:pointer}
.ach-lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s ease;pointer-events:none}
.ach-lightbox.open{opacity:1;pointer-events:auto}
.ach-lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;box-shadow:0 0 40px rgba(0,0,0,.6)}
.ach-lightbox-close{position:absolute;top:1rem;right:1.2rem;font-size:1.5rem;color:var(--muted);cursor:pointer;line-height:1;transition:color .15s}
.ach-lightbox-close:hover{color:var(--silver-bright)}
.ach-lightbox-name{position:absolute;bottom:1.5rem;text-align:center;width:100%;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--silver)}

/* ── Duel cards ── */
.duel-group{margin-bottom:1.5rem}
.duel-group h3{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--silver-bright);letter-spacing:.04em;margin-bottom:.5rem}
.duel-cards{display:flex;flex-direction:column;gap:.5rem}
.duel-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;text-decoration:none;color:inherit;transition:border-color .15s}
.duel-card:hover{border-color:var(--silver-border)}
.duel-card.active-duel{border-left:2px solid var(--gold)}
.dc-left{display:flex;flex-direction:column;gap:.2rem;min-width:0}
.dc-game{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--silver-bright)}
.dc-meta{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted)}
.dc-right{display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.dc-code{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--gold);letter-spacing:.12em;user-select:all;cursor:text}
.dc-status{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.06em;padding:.15rem .45rem;border-radius:10px;border:1px solid}
.dc-status.created{color:var(--gold);border-color:rgba(201,168,76,.3)}
.dc-status.accepted{color:#2dd4a0;border-color:rgba(45,212,160,.3)}
.dc-status.completed{color:var(--silver);border-color:var(--silver-border)}
.dc-status.expired{color:var(--muted);border-color:var(--border)}
.dc-result{font-family:'DM Mono',monospace;font-size:.6rem;padding:.15rem .45rem;border-radius:10px}
.dc-result.won{background:rgba(45,212,160,.1);color:#2dd4a0;border:1px solid rgba(45,212,160,.25)}
.dc-result.lost{background:rgba(176,58,58,.1);color:var(--red);border:1px solid rgba(176,58,58,.25)}
.dc-result.draw{background:var(--silver-dim);color:var(--silver);border:1px solid var(--silver-border)}
.dc-score{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-align:right}
@media(max-width:600px){
  .duel-card{flex-direction:column;align-items:flex-start}
  .dc-right{width:100%;justify-content:flex-start}
}

/* ── Trophy cards ── */
.trophy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
.trophy-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;flex-direction:column;gap:.3rem}
.trophy-game{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--silver-bright)}
.trophy-tier{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.06em}
.trophy-tier.bronze{color:#cd7f32}
.trophy-tier.silver{color:var(--silver)}
.trophy-detail{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--muted)}

/* ── Footer ── */
footer{text-align:center;padding:2rem 0;font-size:.6rem;color:var(--muted);border-top:1px solid var(--border);width:100%}
footer a{color:var(--muted);text-decoration:none;transition:color .15s}
footer a:hover{color:var(--silver-bright)}

/* ── Cookie consent ── */
.cookie-banner{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:1rem;z-index:300;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;font-size:.65rem;color:var(--muted)}
.cookie-banner.hidden{display:none}
.cookie-banner button{font-family:'DM Mono',monospace;font-size:.6rem;padding:.4rem .8rem;border-radius:5px;cursor:pointer;border:none;transition:all .15s}
.cookie-accept{background:var(--silver-bright);color:var(--bg)}
.cookie-decline{background:transparent;border:1px solid var(--border);color:var(--muted)}


/* ── Responsive ── */
@media(max-width:600px){
  .trophy-grid{grid-template-columns:1fr}
  .acct-header h1{font-size:1.8rem}
  .league-card{flex-direction:column;align-items:flex-start}
  .lc-right{width:100%;justify-content:flex-start}
  .ach-card{flex-wrap:wrap}
  .ach-img-wrap{width:100px;height:100px}
  .ach-wallet-btn{width:100%}
}
@media(max-width:375px){
  .ach-img-wrap{width:80px;height:80px}
}
</style>
</head>

<!-- COOKIE CONSENT -->
<div class="cookie-banner" id="cookie-banner">
  <span>This site uses cookies for analytics.</span>
  <button class="cookie-accept" onclick="acceptCookies()">Accept</button>
  <button class="cookie-decline" onclick="declineCookies()">Decline</button>
</div>

<script>
// ── Cookie consent ────────────────────────────────────────────────────
(function(){
  var c = localStorage.getItem('mw_cookies');
  if (c) {
    document.getElementById('cookie-banner').classList.add('hidden');
    if (c === 'accepted') gtag('consent', 'update', { analytics_storage: 'granted' });
  }
})();
function acceptCookies(){
  localStorage.setItem('mw_cookies', 'accepted');
  document.getElementById('cookie-banner').classList.add('hidden');
  gtag('consent', 'update', { analytics_storage: 'granted' });
}
function declineCookies(){
  localStorage.setItem('mw_cookies', 'declined');
  document.getElementById('cookie-banner').classList.add('hidden');
}

// ── Config ────────────────────────────────────────────────────────────
var API = 'https://dapp-api.mathswins.co.uk/api/dapp';
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  API = 'http://127.0.0.1:3860/api/dapp';
}

// Time-primary games: lower is better, display as MM:SS
var TIME_PRIMARY = ['minesweeper','freecell'];

// Game display names
var GAME_NAMES = {
  'sudoku-duel': 'Sudoku Duel', 'minesweeper': 'Minesweeper', 'freecell': 'FreeCell',
  'kenken': 'KenKen', 'nonogram': 'Nonogram', 'kakuro': 'Kakuro',
  'estimation-engine': 'Estimation Engine', 'countdown-numbers': 'Countdown Numbers',
  'cryptarithmetic-club': 'Cryptarithmetic Club', 'sequence-solver': 'Sequence Solver',
  'prime-or-composite': 'Prime or Composite', 'higher-or-lower': 'Higher or Lower',
  'battleships': 'Battleships', 'towers-of-hanoi': 'Towers of Hanoi',
  'dont-press-it': "Don't Press It", 'memory-matrix': 'Memory Matrix',
  'rps-vs-machine': 'RPS vs Machine', 'maffsy': 'Maffsy', '52dle': '52dle',
  'poker-patience': 'Poker Patience', 'cribbage-solitaire': 'Cribbage Solitaire',
  'golf-solitaire': 'Golf Solitaire', 'pyramid': 'Pyramid'
};

// ── Auth gate ─────────────────────────────────────────────────────────
var WALLET = null;
var JWT = null;
var PROFILE = null;

function checkAuth() {
  JWT = localStorage.getItem('qf_auth_token');
  if (!JWT) { location.href = '/qf-dapp/'; return false; }
  try {
    var parts = JWT.split('.');
    var payload = JSON.parse(atob(parts[1]));
    if (payload.exp * 1000 < Date.now()) { localStorage.removeItem('qf_auth_token'); location.href = '/qf-dapp/'; return false; }
    WALLET = payload.wallet;
  } catch (e) { location.href = '/qf-dapp/'; return false; }
  return true;
}

if (!checkAuth()) throw new Error('redirect');

// Show wallet in header
document.getElementById('acctWallet').textContent = WALLET.slice(0, 6) + '...' + WALLET.slice(-4);

// ── Tab switching ─────────────────────────────────────────────────────
var pills = document.querySelectorAll('.tab-pill');
pills.forEach(function(pill) {
  pill.addEventListener('click', function() {
    pills.forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + pill.getAttribute('data-tab')).classList.add('active');
  });
});

// ── Helpers ───────────────────────────────────────────────────────────
function gameName(id) { return GAME_NAMES[id] || id; }

function formatScore(gameId, score) {
  return String(Math.round(score || 0));
}

function formatTimeMs(ms) {
  if (!ms || typeof ms !== 'number' || isNaN(ms) || ms <= 0) return null;
  var s = Math.round(ms / 1000);
  var m = Math.floor(s / 60);
  var sec = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
}

function ordinal(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return n + 'th';
  if (n % 10 === 1) return n + 'st';
  if (n % 10 === 2) return n + 'nd';
  if (n % 10 === 3) return n + 'rd';
  return n + 'th';
}

function formatDate(ts) {
  if (!ts) return '';
  var d = new Date(typeof ts === 'number' ? ts : parseInt(ts));
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function truncTx(tx) {
  if (!tx || tx === 'pending-contract-deploy') return '';
  return tx.slice(0, 8) + '...' + tx.slice(-6);
}

function positionBadge(pos) {
  if (pos === 1) return '<span class="lc-badge gold">1st</span>';
  if (pos === 2) return '<span class="lc-badge silver">2nd</span>';
  if (pos === 3) return '<span class="lc-badge bronze">3rd</span>';
  if (pos) return '<span class="lc-badge" style="border:1px solid var(--border);color:var(--muted)">' + pos + 'th</span>';
  return '';
}

// ── Fetch profile data ────────────────────────────────────────────────
async function loadProfile() {
  try {
    var res = await fetch(API + '/profile/' + WALLET);
    if (!res.ok) throw new Error('Profile fetch failed');
    PROFILE = await res.json();
  } catch (e) {
    PROFILE = { personal_bests: [], league_bests: [], achievements: [], wallet_stats: {}, league_history: [], trophies: [] };
  }

  // QNS name
  if (typeof qfWallet !== 'undefined') {
    qfWallet.resolveAny(WALLET).then(function(name) {
      if (name) {
        document.getElementById('acctQfName').textContent = name;
        document.getElementById('acctQfName').style.display = '';
      }
    });
  }

  renderScores();
  renderAchievements();
  renderTrophies();
}

// ── Fetch leagues ─────────────────────────────────────────────────────
async function loadLeagues() {
  var container = document.getElementById('leaguesContent');
  var loading = document.getElementById('leaguesLoading');
  try {
    var res = await fetch(API + '/leagues/my', {
      headers: { 'Authorization': 'Bearer ' + JWT }
    });
    if (!res.ok) throw new Error('Leagues fetch failed');
    var data = await res.json();
    var html = '';

    // Active leagues
    if (data.active && data.active.length > 0) {
      html += '<div class="league-group"><h3>Active</h3>';
      data.active.forEach(function(l) {
        html += '<a href="/qf-dapp/games/' + l.game_id + '/league/" class="league-card"><div class="lc-left">' +
          '<div class="lc-game">' + gameName(l.game_id) + '</div>' +
          '<div class="lc-tier">' + (l.tier || 'bronze') + ' league</div>' +
          '</div><div class="lc-right">' +
          '<div class="lc-stat"><div class="lc-stat-val">' + (l.puzzles_completed || 0) + '/' + (l.puzzles_total || 10) + '</div><div class="lc-stat-label">Puzzles</div></div>' +
          '<div class="lc-stat"><div class="lc-stat-val">' + (l.cumulative_score || 0) + '</div><div class="lc-stat-label">Score</div></div>' +
          '<div class="lc-stat"><div class="lc-stat-val">' + (l.player_count || 0) + '</div><div class="lc-stat-label">Players</div></div>' +
          '</div></a>';
      });
      html += '</div>';
    }

    // Upcoming (registration)
    if (data.upcoming && data.upcoming.length > 0) {
      html += '<div class="league-group"><h3>Upcoming</h3>';
      data.upcoming.forEach(function(l) {
        html += '<a href="/qf-dapp/games/' + l.game_id + '/league/" class="league-card"><div class="lc-left">' +
          '<div class="lc-game">' + gameName(l.game_id) + '</div>' +
          '<div class="lc-tier">' + (l.tier || 'bronze') + ' league &middot; registration open</div>' +
          '</div><div class="lc-right">' +
          '<div class="lc-stat"><div class="lc-stat-val">' + (l.player_count || 0) + '</div><div class="lc-stat-label">Players</div></div>' +
          '</div></a>';
      });
      html += '</div>';
    }

    // Completed
    if (data.completed && data.completed.length > 0) {
      html += '<div class="league-group"><h3>Completed</h3>';
      data.completed.forEach(function(l) {
        // Find position from league_history in profile
        var pos = null;
        var prize = null;
        if (PROFILE && PROFILE.league_history) {
          var match = PROFILE.league_history.find(function(h) { return h.league_id === l.id; });
          if (match) { pos = match.position; prize = match.prize_amount; }
        }
        html += '<a href="/qf-dapp/games/' + l.game_id + '/league/" class="league-card"><div class="lc-left">' +
          '<div class="lc-game">' + gameName(l.game_id) + '</div>' +
          '<div class="lc-tier">' + (l.tier || 'bronze') + ' league</div>' +
          '</div><div class="lc-right">' +
          (pos ? positionBadge(pos) : '') +
          (prize ? '<div class="lc-stat"><div class="lc-stat-val">' + parseFloat(ethers.formatEther(String(prize))).toFixed(1) + '</div><div class="lc-stat-label">QF Won</div></div>' : '') +
          '<div class="lc-stat"><div class="lc-stat-val">' + (l.player_count || 0) + '</div><div class="lc-stat-label">Players</div></div>' +
          '</div></a>';
      });
      html += '</div>';
    }

    if (!html) html = '<div class="empty">No leagues yet. Join a league from any competitive game page to get started.</div>';

    container.innerHTML = html;
    container.style.display = '';
    loading.style.display = 'none';
  } catch (e) {
    loading.textContent = 'Failed to load leagues.';
  }
}

// ── Render high scores ────────────────────────────────────────────────
async function renderScores() {
  var container = document.getElementById('scoresContent');
  var loading = document.getElementById('scoresLoading');
  var html = '';

  var pb = PROFILE.personal_bests || [];
  var lbPositions = PROFILE.leaderboard_positions || [];

  if (pb.length > 0) {
    // Build lookup: gameId -> array of all ranked periods
    var lbByGame = {};
    lbPositions.forEach(function(pos) {
      if (!lbByGame[pos.game_id]) lbByGame[pos.game_id] = [];
      lbByGame[pos.game_id].push({ rank: pos.rank, periodType: pos.period_type });
    });

    // Build lookup: gameId -> best rank across all periods (for sorting + badge)
    var lbMap = {};
    lbPositions.forEach(function(pos) {
      if (!lbMap[pos.game_id] || pos.rank < lbMap[pos.game_id].rank) {
        lbMap[pos.game_id] = { rank: pos.rank, periodType: pos.period_type };
      }
    });

    // Build set of entered game+period combos
    var enteredSet = {};
    lbPositions.forEach(function(pos) {
      enteredSet[pos.game_id + ':' + pos.period_type] = true;
    });

    // Group by game_id — collect all difficulties per game
    var games = {};
    pb.forEach(function(r) {
      var gid = r.game_id;
      if (!games[gid]) games[gid] = [];
      games[gid].push(r);
    });

    var gameIds = Object.keys(games);

    // Check eligibility for games not yet on any leaderboard (use best score per game)
    // Per-(game, difficulty) eligibility — one batch call covers all difficulties
    // × 3 periods in a single POST. Only rows with session_id participate (needed
    // for server-side session validation at submit time).
    var tuples = [];
    gameIds.forEach(function(gid) {
      games[gid].forEach(function(r) {
        if (r.session_id) {
          tuples.push({
            gameId: gid,
            difficulty: r.difficulty || 'default',
            score: r.score || 0,
            timeMs: r.time_ms || 0,
            sessionId: r.session_id
          });
        }
      });
    });

    // Lookup: `${gameId}:${difficulty}` → [{periodType, shouldPrompt, alreadyEntered, wouldUpdate, rank, ...}, ...]
    var eligibilityByKey = {};
    if (tuples.length > 0 && tuples.length <= 50) {
      try {
        var eligRes = await fetch(API + '/global-leaderboard/eligibility', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + JWT },
          body: JSON.stringify({ tuples: tuples })
        });
        var eligData = await eligRes.json();
        (eligData.results || []).forEach(function(row) {
          eligibilityByKey[row.gameId + ':' + (row.difficulty || 'default')] = row.periods || [];
        });
      } catch (e) { /* eligibility probe is non-fatal — card just won't show per-period prompts */ }
    }

    // Sort: ranked games first (by rank asc), then alphabetically
    gameIds.sort(function(a, b) {
      var aRanked = !!lbMap[a];
      var bRanked = !!lbMap[b];
      if (aRanked && !bRanked) return -1;
      if (!aRanked && bRanked) return 1;
      if (aRanked && bRanked) return lbMap[a].rank - lbMap[b].rank;
      return gameName(a).localeCompare(gameName(b));
    });

    html += '<div class="score-section"><h3>Personal Bests</h3><div class="hs-cards">';
    gameIds.forEach(function(gid) {
      var isTime = TIME_PRIMARY.indexOf(gid) !== -1;
      var ranked = lbMap[gid];
      var rows = games[gid];

      // Header: game name | top rank badge
      html += '<div class="hs-card"><div class="hs-card-header">';
      html += '<span class="hs-card-game">' + gameName(gid) + '</span>';
      if (ranked) {
        var pLabel = ranked.periodType.charAt(0).toUpperCase() + ranked.periodType.slice(1);
        html += '<span class="hs-card-rank">\u2B50 ' + ordinal(ranked.rank) + ' \u00B7 ' + pLabel + '</span>';
      }
      html += '</div>';

      // Order difficulties easy > medium > hard
      var DIFF_ORDER = {easy:0, medium:1, hard:2, beginner:0, intermediate:1, advanced:2, expert:3, pocket:0, default:9};
      rows.sort(function(a, b) {
        var da = DIFF_ORDER[(a.difficulty||'default').toLowerCase()]; if (da === undefined) da = 99;
        var db = DIFF_ORDER[(b.difficulty||'default').toLowerCase()]; if (db === undefined) db = 99;
        return da - db;
      });

      // Ranked-period lookup (shared across all difficulties for this game)
      var rankedPeriods = lbByGame[gid] || [];
      var rankedMap = {};
      rankedPeriods.forEach(function(rp) { rankedMap[rp.periodType] = rp.rank; });

      // Per-difficulty section — each row carries its own per-period submit row
      rows.forEach(function(r) {
        var diff = r.difficulty || 'default';
        var val = isTime ? (formatTimeMs(r.time_ms) || '\u2014') : Number(r.score || 0).toLocaleString();
        var sid = r.session_id || '';
        var hasSession = !!sid;
        var key = gid + ':' + diff;
        var periodResults = eligibilityByKey[key] || [];

        html += '<div class="hs-diff-block">';
        html += '<div class="hs-diff-summary">';
        html += '<span class="hs-diff-name">' + diff + '</span>';
        html += '<span class="hs-diff-score">' + val + '</span>';
        html += '<span class="hs-diff-date">' + formatDate(r.achieved_at) + '</span>';
        html += '</div>';

        // Classify each period for this row. Eligible periods batch into a single
        // 50 QF button; everything else renders as an inline status chip so the
        // Daily/Weekly/Monthly slot always shows something.
        var eligible = [];
        var inlineChips = [];
        ['daily', 'weekly', 'monthly'].forEach(function(p) {
          var pCap = p.charAt(0).toUpperCase() + p.slice(1);
          var currentRank = rankedMap[p];
          var periodRes = hasSession ? (periodResults.filter(function(x) { return x.periodType === p; })[0] || null) : null;

          if (periodRes && periodRes.shouldPrompt) {
            eligible.push({ p: p, pCap: pCap, rank: periodRes.rank, wouldUpdate: !!periodRes.wouldUpdate });
          } else if (currentRank) {
            inlineChips.push('<span class="hs-period ranked">' + pCap + ' \u2B50 ' + ordinal(currentRank) + '</span>');
          } else if (!hasSession) {
            inlineChips.push('<span class="hs-period muted">' + pCap + ' \u2014 play again to submit</span>');
          } else if (periodRes && periodRes.alreadyEntered && !periodRes.wouldUpdate) {
            inlineChips.push('<span class="hs-period muted">' + pCap + ' \u2014 already better</span>');
          } else {
            inlineChips.push('<span class="hs-period muted">' + pCap + ' \u2014 outside top 25</span>');
          }
        });

        html += '<div class="hs-period-row">';
        html += inlineChips.join('');
        if (eligible.length > 0) {
          var anyUpdate = eligible.some(function(e) { return e.wouldUpdate; });
          var btnCls = anyUpdate ? 'hs-period-btn update' : 'hs-period-btn';
          var periodsAttr = eligible.map(function(e) { return e.p; }).join(',');
          var summary = eligible.map(function(e) { return e.pCap + ' ' + ordinal(e.rank); }).join(' \u00B7 ');
          var label = 'Submit to Leaderboard \u2014 ' + summary + ' \u2014 50 QF';
          html += '<button class="' + btnCls + '"'
            + ' data-game-id="' + gid + '"'
            + ' data-sid="' + sid + '"'
            + ' data-score="' + (r.score || 0) + '"'
            + ' data-time-ms="' + (r.time_ms || 0) + '"'
            + ' data-periods="' + periodsAttr + '"'
            + ' onclick="submitToLeaderboard(this)">'
            + label + '</button>';
        }
        html += '</div>';
        html += '</div>';
      });

      html += '</div>';
    });
    html += '</div></div>';
  }

  // Maffsy — special all-time leaderboard (single lifetime-PB board, no periods)
  try {
    var maffsyHtml = await renderMaffsyAlltimeSection();
    if (maffsyHtml) html += maffsyHtml;
  } catch (e) { /* non-fatal — rest of the tab still renders */ }

  // League bests — card layout
  var lb = PROFILE.league_bests || [];
  if (lb.length > 0) {
    var lGames = {};
    lb.forEach(function(r) {
      if (!lGames[r.game_id]) lGames[r.game_id] = [];
      lGames[r.game_id].push(r);
    });
    html += '<div class="score-section"><h3>League Bests</h3><div class="hs-cards">';
    Object.keys(lGames).forEach(function(gid) {
      lGames[gid].forEach(function(r) {
        html += '<div class="hs-card"><div class="hs-card-header">';
        html += '<span class="hs-card-game">' + gameName(gid) + '</span>';
        html += '<span class="hs-card-diff">' + (r.tier || 'bronze') + '</span>';
        html += '</div>';
        html += '<div class="hs-card-stats">';
        html += '<div class="hs-stat"><div class="hs-stat-label">Total Score</div><div class="hs-stat-val">' + Number(r.best_total_score || 0).toLocaleString() + '</div></div>';
        html += '<div class="hs-stat"><div class="hs-stat-label">Date Set</div><div class="hs-stat-val">' + formatDate(r.achieved_at) + '</div></div>';
        html += '</div></div>';
      });
    });
    html += '</div></div>';
  }

  if (!html) html = '<div class="empty">No scores recorded yet. Play a game to get started.</div>';

  container.innerHTML = html;
  container.style.display = '';
  loading.style.display = 'none';
}

// ── Submit to leaderboard (mirrors qf-leaderboard-prompt.js pay pattern) ──
// Single 50 QF payment batches every eligible period for this PB row.
async function submitToLeaderboard(btn) {
  var gameId = btn.getAttribute('data-game-id');
  var sessionId = btn.getAttribute('data-sid');
  var score = Number(btn.getAttribute('data-score')) || 0;
  var timeMs = Number(btn.getAttribute('data-time-ms')) || 0;
  var periodTypes = (btn.getAttribute('data-periods') || '').split(',').filter(Boolean);
  if (!gameId || !sessionId || periodTypes.length === 0) {
    btn.textContent = 'Missing data';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Waiting for wallet\u2026';

  var txHash;
  try {
    var cfgRes = await fetch(API + '/achievement/mint-config', {
      headers: { 'Authorization': 'Bearer ' + JWT }
    });
    var cfg = await cfgRes.json();
    if (!cfg || !cfg.escrowAddress) { btn.textContent = 'Config error'; btn.disabled = false; return; }

    var signer = (window.qfWallet && window.qfWallet.signer) || null;
    if (!signer || !signer.sendTransaction) { btn.textContent = 'Wallet not connected'; btn.disabled = false; return; }

    var tx = await signer.sendTransaction({ to: cfg.escrowAddress, value: ethers.parseEther('50') });
    txHash = tx && tx.hash;
    if (!txHash) { btn.textContent = 'No tx hash'; btn.disabled = false; return; }
  } catch (e) {
    var code = e && (e.code || (e.info && e.info.error && e.info.error.code));
    var isReject = code === 'ACTION_REJECTED' || code === 4001 ||
      (e && e.message && /user (rejected|denied)/i.test(e.message));
    btn.textContent = isReject ? 'Rejected' : 'Wallet error';
    btn.disabled = false;
    return;
  }

  btn.textContent = 'Processing\u2026';
  var qnsName = (window.qfWallet && window.qfWallet.qfName) || null;
  if (!qnsName && window.qfWallet && window.qfWallet.resolveAny && window.qfWallet.address) {
    try { qnsName = await window.qfWallet.resolveAny(window.qfWallet.address); } catch (e) { qnsName = null; }
  }
  try {
    var res = await fetch(API + '/global-leaderboard/enter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + JWT },
      body: JSON.stringify({ gameId: gameId, score: score, timeMs: timeMs, periodTypes: periodTypes, sessionId: sessionId, txHash: txHash, qnsName: qnsName })
    });
    var data = await res.json();
    if (data.success) {
      var entered = data.entered || [];
      var cap = function(s) { return s.charAt(0).toUpperCase() + s.slice(1); };
      // Replace the single batched button with one ranked chip per entered period.
      var chips = entered.map(function(e) {
        return '<span class="hs-period ranked">' + cap(e.periodType) + ' \u2B50 ' + ordinal(e.rank) + '</span>';
      }).join('');
      btn.outerHTML = chips || '<span class="hs-period ranked">\u2B50 Submitted</span>';
    } else {
      btn.textContent = data.error || 'Failed';
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

// ── Maffsy all-time leaderboard section ──────────────────────────────
async function renderMaffsyAlltimeSection() {
  // Fetch current stats + submitted row. If wallet isn't set (shouldn't happen on this page) bail.
  var statsRes, lbRes, stats = null, board = null, yourRow = null;
  try {
    statsRes = await fetch(API + '/maffsy/stats', { headers: { 'Authorization': 'Bearer ' + JWT } });
    if (statsRes.ok) stats = await statsRes.json();
  } catch (e) { return ''; }
  try {
    lbRes = await fetch(API + '/maffsy/leaderboard', { headers: { 'Authorization': 'Bearer ' + JWT } });
    if (lbRes.ok) board = await lbRes.json();
  } catch (e) { /* non-fatal */ }
  if (board) yourRow = board.yourRow || null;

  var maxStreak = (stats && stats.maxStreak) || 0;
  var submittedScore = yourRow ? yourRow.score : 0;
  var submittedRank = yourRow ? yourRow.rank : null;

  // Don't render the section at all if the user has never played Maffsy.
  if (maxStreak === 0 && !yourRow) return '';

  var h = '<div class="score-section"><h3>Maffsy All-Time</h3><div class="hs-cards">';
  h += '<div class="hs-card"><div class="hs-card-header">';
  h += '<span class="hs-card-game">Maffsy</span>';
  if (submittedRank) {
    h += '<span class="hs-card-rank">\u2B50 ' + ordinal(submittedRank) + ' \u00B7 All-Time</span>';
  }
  h += '</div>';
  h += '<div class="hs-diff-block"><div class="hs-diff-summary">';
  h += '<span class="hs-diff-name">lifetime</span>';
  h += '<span class="hs-diff-score">' + maxStreak + ' streak</span>';
  h += '<span class="hs-diff-date">' + (yourRow ? ('submitted ' + submittedScore) : '—') + '</span>';
  h += '</div>';
  h += '<div class="hs-period-row">';
  if (maxStreak === 0) {
    h += '<span class="hs-period muted">Play Maffsy to set a streak</span>';
  } else if (submittedScore >= maxStreak) {
    h += '<span class="hs-period ranked">All-Time \u2B50 ' + (submittedRank ? ordinal(submittedRank) : 'submitted') + '</span>';
  } else {
    var isUpdate = !!yourRow;
    var btnCls = isUpdate ? 'hs-period-btn update' : 'hs-period-btn';
    var label = 'Submit to Leaderboard \u2014 All-Time ' + maxStreak + ' \u2014 50 QF';
    h += '<button class="' + btnCls + '" data-score="' + maxStreak + '" onclick="submitMaffsyLeaderboard(this)">' + label + '</button>';
  }
  h += '</div></div></div></div></div>';
  return h;
}

async function submitMaffsyLeaderboard(btn) {
  btn.disabled = true;
  btn.textContent = 'Waiting for wallet\u2026';

  var txHash;
  try {
    var cfgRes = await fetch(API + '/achievement/mint-config', {
      headers: { 'Authorization': 'Bearer ' + JWT }
    });
    var cfg = await cfgRes.json();
    if (!cfg || !cfg.escrowAddress) { btn.textContent = 'Config error'; btn.disabled = false; return; }

    var signer = (window.qfWallet && window.qfWallet.signer) || null;
    if (!signer || !signer.sendTransaction) { btn.textContent = 'Wallet not connected'; btn.disabled = false; return; }

    var tx = await signer.sendTransaction({ to: cfg.escrowAddress, value: ethers.parseEther('50') });
    txHash = tx && tx.hash;
    if (!txHash) { btn.textContent = 'No tx hash'; btn.disabled = false; return; }
  } catch (e) {
    var code = e && (e.code || (e.info && e.info.error && e.info.error.code));
    var isReject = code === 'ACTION_REJECTED' || code === 4001 ||
      (e && e.message && /user (rejected|denied)/i.test(e.message));
    btn.textContent = isReject ? 'Rejected' : 'Wallet error';
    btn.disabled = false;
    return;
  }

  btn.textContent = 'Processing\u2026';
  var qnsName = (window.qfWallet && window.qfWallet.qfName) || null;
  if (!qnsName && window.qfWallet && window.qfWallet.resolveAny && window.qfWallet.address) {
    try { qnsName = await window.qfWallet.resolveAny(window.qfWallet.address); } catch (e) { qnsName = null; }
  }
  try {
    var res = await fetch(API + '/maffsy/leaderboard-submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + JWT },
      body: JSON.stringify({ txHash: txHash, qnsName: qnsName })
    });
    var data = await res.json();
    if (data.success) {
      btn.outerHTML = '<span class="hs-period ranked">All-Time \u2B50 ' + (data.rank ? ordinal(data.rank) : 'submitted') + '</span>';
    } else {
      btn.textContent = data.error || 'Failed';
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

// ── Render achievements ───────────────────────────────────────────────
async function renderAchievements() {
  var container = document.getElementById('achievementsContent');
  var loading = document.getElementById('achievementsLoading');

  // Check if achievements system is active
  var achActive = false;
  try {
    var statusRes = await fetch(API + '/achievements/status');
    var statusData = await statusRes.json();
    achActive = statusData.active;
  } catch (e) { /* default false */ }

  if (!achActive) {
    container.innerHTML = '<div class="coming-soon">Achievements are coming soon.</div>' +
      '<a href="/qf-dapp/achievements/" class="ach-browse">Browse all achievements &rarr;</a>';
    container.style.display = '';
    loading.style.display = 'none';
    return;
  }

  var achs = PROFILE.achievements || [];
  var stats = PROFILE.wallet_stats || {};
  var html = '';

  // Free mints banner
  var freeMints = stats.free_mints_banked || 0;
  if (freeMints > 0) {
    html += '<div class="free-mints-banner">You have ' + freeMints + ' free mint' + (freeMints > 1 ? 's' : '') + ' banked</div>';
  }

  if (achs.length > 0) {
    // Sort by earned_at descending
    achs.sort(function(a, b) { return (b.earned_at || 0) - (a.earned_at || 0); });
    html += '<div class="ach-list">';
    achs.forEach(function(a, idx) {
      var isMinted = !!a.minted_at;
      var hasCid = !!a.metadata_cid;

      // Image area: minted with CID gets clear image, unminted bespoke gets blurred preview, rest gets padlock
      var imgHtml = '';
      var bespokeEntry = IPFS_MAP[a.achievement_id];
      if (isMinted && hasCid) {
        imgHtml = '<div class="ach-img-wrap" id="ach-img-' + idx + '"></div>';
      } else if (!isMinted && bespokeEntry) {
        imgHtml = '<div class="ach-img-wrap" id="ach-img-' + idx + '" data-blur="1"><span class="ach-blur-overlay">Mint to reveal</span></div>';
      } else if (!isMinted) {
        imgHtml = '<div class="ach-img-wrap"><div class="ach-placeholder"><span class="lock-icon">&#x1F512;</span><span class="lock-text">Mint to reveal</span></div></div>';
      }

      var pioneerClass = a.is_pioneer ? ' pioneer' : '';
      html += '<div class="ach-card' + pioneerClass + '">' + imgHtml +
        '<div class="ach-body">' +
        '<div class="ach-name">' + (a.name || a.achievement_id || 'Achievement') + '</div>' +
        (a.description ? '<div class="ach-desc">Earned for: ' + a.description + '</div>' : '') +
        '<div class="ach-date">Earned ' + formatDate(a.earned_at) + '</div>' +
        '</div><div class="ach-right-col">';
      if (isMinted) {
        html += '<div class="ach-minted">Minted</div>';
        if (a.tx_hash && a.tx_hash !== 'pending-contract-deploy') {
          html += '<div class="ach-tx">' + truncTx(a.tx_hash) + '</div>';
        }
        if (a.token_id) {
          html += '<button class="ach-wallet-btn" onclick="viewInMetaMask(\'' + a.token_id + '\',this)">View in MetaMask</button>';
        }
      } else {
        var fee = a.mint_fee_qf || 0;
        var feeLabel = fee > 0 ? 'Mint (' + fee + ' QF)' : 'Mint (Free)';
        html += '<button class="ach-mint-btn" data-fee="' + fee + '" onclick="mintAchievement(\'' + a.achievement_id + '\',' + fee + ',this)">' + feeLabel + '</button>';
      }
      html += '</div></div>';
    });
    html += '</div>';
  } else {
    html += '<div class="empty">No achievements yet. Start playing to earn your first.</div>';
  }

  html += '<a href="/qf-dapp/achievements/" class="ach-browse">Browse all achievements &rarr;</a>';

  container.innerHTML = html;
  container.style.display = '';
  loading.style.display = 'none';

  // Async image loading — minted get clear image, unminted bespoke get blurred preview
  achs.forEach(function(a, idx) {
    var wrap = document.getElementById('ach-img-' + idx);
    if (!wrap) return;
    var isBlur = wrap.getAttribute('data-blur') === '1';
    var bespokeEntry = IPFS_MAP[a.achievement_id];

    // Determine image source: minted uses metadata_cid, unminted bespoke uses ipfs-mapping
    var imageSrc = null;
    if (a.minted_at && a.metadata_cid) {
      // Fetch metadata to get image URL — clickable lightbox for minted
      (function(wrapEl, cid, achName) {
        fetch('https://gateway.pinata.cloud/ipfs/' + cid)
          .then(function(r) { if (!r.ok) throw new Error('fetch failed'); return r.json(); })
          .then(function(meta) {
            if (!meta || !meta.image) throw new Error('no image');
            var imgUrl = meta.image;
            if (imgUrl.startsWith('ipfs://')) imgUrl = 'https://gateway.pinata.cloud/ipfs/' + imgUrl.slice(7);
            var img = document.createElement('img');
            img.alt = achName;
            img.onload = function() { img.classList.add('loaded'); };
            img.onerror = function() { wrapEl.innerHTML = '<div class="ach-placeholder"><span class="lock-icon">&#x1F5BC;</span></div>'; };
            img.src = imgUrl;
            wrapEl.insertBefore(img, wrapEl.firstChild);
            wrapEl.classList.add('clickable');
            wrapEl.onclick = function(e) { e.stopPropagation(); openLightbox(imgUrl, achName); };
          })
          .catch(function() { wrapEl.innerHTML = '<div class="ach-placeholder"><span class="lock-icon">&#x1F5BC;</span></div>'; });
      })(wrap, a.metadata_cid, a.name || a.achievement_id);
    } else if (isBlur && bespokeEntry) {
      // Unminted bespoke — show blurred image from ipfs-mapping
      (function(wrapEl, entry) {
        var imgUrl = entry.image_ipfs;
        if (imgUrl.startsWith('ipfs://')) imgUrl = 'https://gateway.pinata.cloud/ipfs/' + imgUrl.slice(7);
        var img = document.createElement('img');
        img.alt = 'Blurred preview';
        img.className = 'blurred';
        img.onload = function() { img.classList.add('loaded'); };
        img.onerror = function() { wrapEl.innerHTML = '<div class="ach-placeholder"><span class="lock-icon">&#x1F512;</span><span class="lock-text">Mint to reveal</span></div>'; };
        img.src = imgUrl;
        wrapEl.insertBefore(img, wrapEl.firstChild);
      })(wrap, bespokeEntry);
    }
  });
}

// ── Mint config (cached) ─────────────────────────────────────────────
var mintConfig = null;
async function getMintConfig() {
  if (mintConfig) return mintConfig;
  var r = await fetch(API + '/achievement/mint-config', {
    headers: { 'Authorization': 'Bearer ' + JWT }
  });
  mintConfig = await r.json();
  return mintConfig;
}

// ── Send QF payment to escrow ────────────────────────────────────────
async function sendMintPayment(escrowAddress, amountQF) {
  var signer = qfWallet.signer || (qfWallet.state && qfWallet.state.signer);
  if (!signer || !signer.sendTransaction) throw new Error('Wallet signer not available');
  var value = ethers.parseEther(String(amountQF));
  var tx = await signer.sendTransaction({ to: escrowAddress, value: value });
  var receipt = await tx.wait();
  return receipt.hash;
}

// ── Mint achievement ──────────────────────────────────────────────────
async function mintAchievement(achievementId, fee, btn) {
  btn.disabled = true;
  var originalText = btn.textContent;
  try {
    var cfg = await getMintConfig();
    var txHash = null;

    // Player pays if fee > 0 and not owner-whitelisted
    if (fee > 0 && !cfg.ownerBypass) {
      // Check free mints first — server will use banked mint if available
      var stats = PROFILE.wallet_stats || {};
      var freeBanked = stats.free_mints_banked || 0;
      if (freeBanked <= 0) {
        btn.textContent = 'Sending ' + fee + ' QF...';
        try {
          txHash = await sendMintPayment(cfg.escrowAddress, fee);
        } catch (e) {
          if (e.code === 'ACTION_REJECTED' || (e.message && e.message.indexOf('rejected') !== -1)) {
            btn.textContent = 'Cancelled';
          } else {
            btn.textContent = 'Payment failed';
          }
          btn.disabled = false;
          setTimeout(function() { btn.textContent = originalText; btn.disabled = false; }, 3000);
          return;
        }
      }
    }

    btn.textContent = 'Minting...';
    var res = await fetch(API + '/achievement/mint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + JWT },
      body: JSON.stringify({ achievement_id: achievementId, txHash: txHash })
    });
    var data = await res.json();
    if (data.minted) {
      btn.textContent = 'Minted';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      // Unblur image if it was a bespoke blurred preview
      var card = btn.closest('.ach-card');
      if (card) {
        var blurredImg = card.querySelector('img.blurred');
        if (blurredImg) {
          blurredImg.classList.remove('blurred');
        }
        var overlay = card.querySelector('.ach-blur-overlay');
        if (overlay) overlay.remove();
      }
      // View in MetaMask button
      if (data.token_id) {
        var mmBtn = document.createElement('button');
        mmBtn.className = 'ach-wallet-btn';
        mmBtn.textContent = 'View in MetaMask';
        mmBtn.onclick = function() { viewInMetaMask(data.token_id, mmBtn); };
        btn.parentNode.appendChild(mmBtn);
      }
    } else if (data.status === 'coming_soon') {
      btn.textContent = 'Coming Soon';
    } else {
      btn.textContent = data.error || 'Failed';
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

// ── View in MetaMask (EIP-747 wallet_watchAsset) ────────────────────
async function viewInMetaMask(tokenId, btn) {
  btn.disabled = true;
  btn.textContent = 'Opening...';
  try {
    var ethereum = window.ethereum;
    if (!ethereum) throw new Error('no provider');
    await ethereum.request({
      method: 'wallet_watchAsset',
      params: {
        type: 'ERC721',
        options: {
          address: '0xc519E65Fb767DBEFC46FF0dC797Ccd0318Ae12eD',
          tokenId: String(tokenId)
        }
      }
    });
    btn.textContent = 'View in MetaMask';
    btn.disabled = false;
  } catch (e) {
    btn.textContent = 'View in MetaMask';
    btn.disabled = false;
  }
}

// ── Achievement image lightbox ───────────────────────────────────────
function openLightbox(imgSrc, name) {
  var lb = document.getElementById('achLightbox');
  document.getElementById('achLightboxImg').src = imgSrc;
  document.getElementById('achLightboxName').textContent = name || '';
  lb.classList.add('open');
}
function closeLightbox() {
  var lb = document.getElementById('achLightbox');
  lb.classList.remove('open');
  document.getElementById('achLightboxImg').src = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

// ── Render trophies ───────────────────────────────────────────────────
function renderTrophies() {
  var container = document.getElementById('trophiesContent');
  var loading = document.getElementById('trophiesLoading');
  var trophies = PROFILE.trophies || [];

  if (trophies.length === 0) {
    container.innerHTML = '<div class="empty">No trophies yet. Finish in the top positions of a league to earn one.</div>';
    container.style.display = '';
    loading.style.display = 'none';
    return;
  }

  var html = '<div class="trophy-grid">';
  trophies.forEach(function(t) {
    // Look up league info from league_history
    var leagueInfo = null;
    if (PROFILE.league_history) {
      leagueInfo = PROFILE.league_history.find(function(l) { return l.league_id === t.league_id; });
    }
    var gName = leagueInfo ? gameName(leagueInfo.game_id) : 'League ' + (t.league_id || '').slice(0, 8);
    var tier = leagueInfo ? (leagueInfo.tier || 'bronze') : '';
    var tierClass = tier.toLowerCase();

    html += '<div class="trophy-card">' +
      '<div class="trophy-game">' + gName + '</div>' +
      (tier ? '<div class="trophy-tier ' + tierClass + '">' + tier + ' trophy</div>' : '') +
      '<div class="trophy-detail">' + formatDate(t.minted_at) + '</div>' +
      (t.tx_hash ? '<div class="trophy-detail">' + truncTx(t.tx_hash) + '</div>' : '') +
      '</div>';
  });
  html += '</div>';

  container.innerHTML = html;
  container.style.display = '';
  loading.style.display = 'none';
}

// ── Load duels ───────────────────────────────────────────────────────
async function loadDuels() {
  var container = document.getElementById('duelsContent');
  var loading = document.getElementById('duelsLoading');
  try {
    var res = await fetch(API + '/duels/history', {
      headers: { 'X-Wallet-Address': WALLET, 'Authorization': 'Bearer ' + JWT }
    });
    if (!res.ok) throw new Error('Duels fetch failed');
    var duels = await res.json();

    var active = [];
    var finished = [];
    duels.forEach(function(d) {
      if (d.status === 'created' || d.status === 'accepted') active.push(d);
      else finished.push(d);
    });

    var html = '';

    if (active.length > 0) {
      html += '<div class="duel-group"><h3>Active Duels</h3><div class="duel-cards">';
      active.forEach(function(d) {
        var isCreator = d.creator_wallet && d.creator_wallet.toLowerCase() === WALLET.toLowerCase();
        var statusLabel = d.status === 'created' ? 'Waiting for opponent' : 'In progress';
        var gameUrl = '/qf-dapp/games/' + d.game_id + '/?duel=' + d.share_code;
        html += '<a href="' + gameUrl + '" class="duel-card active-duel">';
        html += '<div class="dc-left">';
        html += '<div class="dc-game">' + gameName(d.game_id) + '</div>';
        html += '<div class="dc-meta">' + (isCreator ? 'You created' : 'You accepted') + ' &middot; ' + formatDate(d.created_at) + '</div>';
        html += '</div>';
        html += '<div class="dc-right">';
        html += '<span class="dc-code">' + d.share_code + '</span>';
        html += '<span class="dc-status ' + d.status + '">' + statusLabel + '</span>';
        html += '</div>';
        html += '</a>';
      });
      html += '</div></div>';
    }

    if (finished.length > 0) {
      html += '<div class="duel-group"><h3>Recent Duels</h3><div class="duel-cards">';
      finished.forEach(function(d) {
        var isCreator = d.creator_wallet && d.creator_wallet.toLowerCase() === WALLET.toLowerCase();
        var myScore = isCreator ? d.creator_score : d.opponent_score;
        var theirScore = isCreator ? d.opponent_score : d.creator_score;

        var resultClass = '';
        var resultText = '';
        if (d.status === 'expired') {
          resultClass = 'expired';
          resultText = 'Expired';
        } else if (d.winner_wallet) {
          if (d.winner_wallet.toLowerCase() === WALLET.toLowerCase()) {
            resultClass = 'won';
            resultText = 'Won';
          } else {
            resultClass = 'lost';
            resultText = 'Lost';
          }
        } else if (d.status === 'completed') {
          resultClass = 'draw';
          resultText = 'Draw';
        }

        html += '<div class="duel-card">';
        html += '<div class="dc-left">';
        html += '<div class="dc-game">' + gameName(d.game_id) + '</div>';
        html += '<div class="dc-meta">' + d.share_code + ' &middot; ' + formatDate(d.created_at) + '</div>';
        html += '</div>';
        html += '<div class="dc-right">';
        if (d.status === 'completed' && myScore != null) {
          html += '<span class="dc-score">' + Number(myScore).toLocaleString() + ' &ndash; ' + Number(theirScore || 0).toLocaleString() + '</span>';
        }
        if (resultText) {
          html += '<span class="dc-result ' + resultClass + '">' + resultText + '</span>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    if (!html) html = '<div class="empty">No duels yet. Challenge someone from any competitive game page.</div>';

    container.innerHTML = html;
    container.style.display = '';
    loading.style.display = 'none';
  } catch (e) {
    loading.textContent = 'Failed to load duels.';
  }
}

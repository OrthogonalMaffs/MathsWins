<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFT Trophy Preview — Sudoku Duel Silver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0b0d;color:#c8ccd4;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

.nft-card{width:100%;max-width:420px;background:#12141a;border:1px solid #2a2e38;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6)}

.nft-image{width:100%;aspect-ratio:1;overflow:hidden;position:relative}
.nft-image img{width:100%;height:100%;object-fit:cover}
.nft-badge{position:absolute;top:12px;right:12px;background:rgba(184,188,198,0.15);backdrop-filter:blur(8px);border:1px solid rgba(184,188,198,0.2);border-radius:20px;padding:4px 12px;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:#d4d8e2}
.nft-position{position:absolute;top:12px;left:12px;background:rgba(201,168,76,0.9);color:#0a0b0d;border-radius:20px;padding:4px 14px;font-size:0.6rem;font-weight:700;letter-spacing:0.1em}

.nft-body{padding:1.4rem}
.nft-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#e8eaf0;margin-bottom:0.3rem}
.nft-sub{font-size:0.5rem;color:#4a4e5a;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.2rem}

.nft-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1.2rem}
.stat{background:#0e1013;border:1px solid #1e2228;border-radius:8px;padding:0.7rem}
.stat-val{font-size:0.95rem;font-weight:700;color:#d4d8e2;margin-bottom:0.15rem}
.stat-label{font-size:0.4rem;letter-spacing:0.12em;text-transform:uppercase;color:#4a4e5a}
.stat.highlight .stat-val{color:#c9a84c}

.nft-traits{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.2rem}
.trait{background:#0e1013;border:1px solid #1e2228;border-radius:6px;padding:0.4rem 0.7rem;flex:0 0 auto}
.trait-label{font-size:0.35rem;letter-spacing:0.1em;text-transform:uppercase;color:#4a4e5a;margin-bottom:0.15rem}
.trait-val{font-size:0.55rem;color:#b8bcc6}

.nft-footer{border-top:1px solid #1e2228;padding:1rem 1.4rem;display:flex;justify-content:space-between;align-items:center}
.nft-chain{font-size:0.45rem;color:#4a4e5a;letter-spacing:0.1em;text-transform:uppercase}
.nft-soulbound{font-size:0.45rem;color:#b03a3a;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:0.3rem}
.lock-icon{width:10px;height:10px;display:inline-block}
</style>
</head>
<body>

<div class="nft-card">
  <div class="nft-image">
    <img src="assets/logo-silver.png" alt="Sudoku Duel Silver Trophy">
    <span class="nft-badge">Soulbound</span>
    <span class="nft-position">1st Place</span>
  </div>

  <div class="nft-body">
    <div class="nft-title">Silver League Champion</div>
    <div class="nft-sub">Sudoku Duel &mdash; Season 8b0a &mdash; 3 Apr 2026</div>

    <div class="nft-stats">
      <div class="stat highlight">
        <div class="stat-val">3,615</div>
        <div class="stat-label">Total Score</div>
      </div>
      <div class="stat">
        <div class="stat-val">2 / 10</div>
        <div class="stat-label">Puzzles Completed</div>
      </div>
      <div class="stat">
        <div class="stat-val">27:04</div>
        <div class="stat-label">Total Time</div>
      </div>
      <div class="stat">
        <div class="stat-val">2.5 QF</div>
        <div class="stat-label">Prize Won</div>
      </div>
    </div>

    <div class="nft-traits">
      <div class="trait">
        <div class="trait-label">Mistakes</div>
        <div class="trait-val">14</div>
      </div>
      <div class="trait">
        <div class="trait-label">Hints</div>
        <div class="trait-val">4</div>
      </div>
      <div class="trait">
        <div class="trait-label">Players</div>
        <div class="trait-val">5</div>
      </div>
      <div class="trait">
        <div class="trait-label">Tier</div>
        <div class="trait-val">Silver</div>
      </div>
      <div class="trait">
        <div class="trait-label">League</div>
        <div class="trait-val">6adec25f</div>
      </div>
    </div>
  </div>

  <div class="nft-footer">
    <span class="nft-chain">QF Network</span>
    <span class="nft-soulbound">
      <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      Non-Transferable
    </span>
  </div>
</div>

</body>
</html>
